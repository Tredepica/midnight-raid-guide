const AB={"Gathering Darkness":{t:"cast",d:"Cast 8s al Voidshapers. Daca se completeaza, patratul e revendicat. INTERRUPT!",i:"\u{1F52E}"},"Umbral Collapse":{t:"mechanic",d:"Cerc de soak pe jucatori. Damage split. Muta-te pe patratul callat.",i:"\u2B55"},"Dark Tears":{t:"mechanic",d:"Portaluri care genereaza adduri. Wavele cresc in putere.",i:"\u{1F300}"},"Dark Upheaval":{t:"damage",d:"Damage raid-wide constant, creste pe masura ce arena se umple.",i:"\u{1F4A5}"},"Blackening Wounds":{t:"debuff",d:"Debuff stacking pe tank, reduce HP maxim. Swap la ~10 stacks.",i:"\u{1FA78}"},"March of the Endless":{t:"wipe",d:"WIPE. 3 patrate aliniate pe orice linie = instant raid wipe.",i:"\u{1F480}"},"Shadow's Advance":{t:"mechanic",d:"Spawneaza 3 Voidshapers in zone diferite. Poti opri doar 2 din 3.",i:"\u2694\uFE0F"},"Void Breath":{t:"wipe",d:"Beam masiv care matura camera. Fara safe lane = wipe.",i:"\u{1F480}"},"Smashing Frenzy":{t:"tank",d:"Frontal OBLIGATORIU de tanked. Miss = explozie letala.",i:"\u{1F6E1}\uFE0F"},"Shadowclaw Slam":{t:"tank",d:"Primele 2 hituri = Smashed (+150% phys/stack). T1 ia 2, T2 preia.",i:"\u{1F43E}"},"Smashed":{t:"debuff",d:"+150% phys damage/stack, 2 min. 2 stacks = +300%.",i:"\u{1FA78}"},"Crystalline Eruption":{t:"tank",d:"Creeaza ziduri de cristal + debuff tank. Swap pe debuff.",i:"\u{1F6E1}\uFE0F"},"Blistercreep":{t:"add",d:"Adduri fixate. Kiteaza langa ziduri, omoara = explozia sparge cristalul.",i:"\u{1F41B}"},"Primordial Roar":{t:"damage",d:"Damage raid-wide progresiv cu Primordial Power stacks.",i:"\u{1F4A5}"},"Aftershock":{t:"mechanic",d:"Cercuri expandabile dupa slam. Melee: impact=safe. Ranged: outrange.",i:"\u{1F535}"},"Void Infusion":{t:"wipe",d:"WIPE. Orb ajunge la boss = instant raid wipe.",i:"\u{1F480}"},"Concentrated Void":{t:"mechanic",d:"Orbe care plutesc spre boss. Distruge inainte sa ajunga!",i:"\u{1F7E3}"},"Cosmic Unraveling":{t:"damage",d:"Damage constant. La 100E = beam-uri rotative + boss ia dmg crescut.",i:"\u{1F4A5}"},"Despotic Command":{t:"debuff",d:"Jucator marcat lasa puddle. Plaseaza langa pereti.",i:"\u{1F7E1}"},"Shattering Twilight":{t:"tank",d:"Tankul activ iese din raid, spike patterns sa nu blocheze lanes.",i:"\u{1F6E1}\uFE0F"},"Fractured Projections":{t:"add",d:"Illusions, interrupt/stun rapid.",i:"\u{1F464}"},"Twilight Bond":{t:"wipe",d:"HP difera >15% = +100% damage. Dragon mort = Twilight Fury.",i:"\u{1F480}"},"Vaelwing":{t:"tank",d:"Vaelgor buffeaza melee pe tank. Active mitigation.",i:"\u{1F6E1}\uFE0F"},"Rakfang":{t:"tank",d:"Hit fizic + heal absorb stacking. Swap dupa 3 stacks.",i:"\u{1F6E1}\uFE0F"},"Tail Lash":{t:"mechanic",d:"35yd con in SPATELE dragonului. Knockback + bleed.",i:"\u26A0\uFE0F"},"Impale":{t:"mechanic",d:"Dupa Rakfang, con frontal. Bleed + stun 3s.",i:"\u26A0\uFE0F"},"Gloom":{t:"mechanic",d:"Orb frontal Ezzorak. Creeaza Gloomfield. Soak = micsoreaza puddle.",i:"\u{1F311}"},"Gloomtouched":{t:"debuff",d:"Shadow DoT 12s la soak Gloom. Normal: fara Diminish.",i:"\u{1FA78}"},"Midnight Flames":{t:"damage",d:"100 energie: dragoni zboara, Shadow dmg masiv 10s. Stai in Barrier!",i:"\u{1F525}"},"Radiant Barrier":{t:"buff",d:"Scut NPC. Absoarbe Midnight Flames. 25% trece prin. OBLIGATORIU.",i:"\u2728"},"Nullbeam":{t:"mechanic",d:"Tether pe jucatori. Dupa, Voidorbs spawn.",i:"\u26A1"},"Voidorbs":{t:"add",d:"Dupa Nullbeam. Voidbolt pe random (interruptibil). Grupeaza + AoE.",i:"\u{1F7E3}"},"Dread Breath":{t:"mechanic",d:"Vaelgor frontal pe random player. Target: misca-te din grup!",i:"\u{1F409}"},"Light Infused":{t:"damage",d:"Tick damage constant pe tot raidul, toata lupta.",i:"\u{1F4A5}"},"Avenger's Shield":{t:"mechanic",d:"Cercuri pe jucatori. Damage in cerc. SPREAD imediat.",i:"\u{1F6E1}\uFE0F"},"Tyr's Wrath":{t:"debuff",d:"Heal absorb pe cei mai apropiati 3 jucatori. Roteaza.",i:"\u26D3\uFE0F"},"Sacred Shield":{t:"buff",d:"Boss imun la interrupts cat e activ. Focus dmg pe shield.",i:"\u2728"},"Consecration Zones":{t:"mechanic",d:"Zone permanente la expirare aure. Spatiul se reduce.",i:"\u{1F536}"},"Empowerment":{t:"mechanic",d:"Lightblood=dmg buff, Bellamy=dmg reduce, Senn=silence complet.",i:"\u26A1"},"Echoing Darkness":{t:"wipe",d:"Sentinel fara tank in melee / tank pierde range Alleria = wipe.",i:"\u{1F480}"},"Undying Sentinels":{t:"add",d:"3 Sentinels, fiecare cu tank dedicat in melee PERMANENT.",i:"\u{1F464}"},"Silverstrike Arrow":{t:"mechanic",d:"Curata debuffuri Void DAR aplica heal reduction. Evita cleave.",i:"\u{1F3F9}"},"Null Corona":{t:"debuff",d:"Heal absorb pe target. Heal-through inainte de dispel.",i:"\u26D3\uFE0F"},"Aspect of the End":{t:"debuff",d:"Reduce healing pana target se misca corect.",i:"\u{1FA78}"},"Gravity Collapse":{t:"mechanic",d:"Faza 2, se suprapune cu anomalies. Miscare + defensives.",i:"\u{1F300}"},"Grasp of Emptiness":{t:"mechanic",d:"Beam explosions. Disciplina de miscare.",i:"\u26A1"},"Alnsight":{t:"buff",d:"Buff de la Alndust Upheaval soak. Permite targetarea adds in Rift.",i:"\u{1F441}\uFE0F"},"Alndust Upheaval":{t:"mechanic",d:"Cerc soak = Alnsight buff. Permite targetarea Manifestations.",i:"\u2B55"},"Manifestations":{t:"add",d:"Adds din Rift. Necesita Alnsight. La boss = Cannibalized Essence.",i:"\u{1F47B}"},"Cannibalized Essence":{t:"debuff",d:"Buff PERMANENT pe boss per add consumat. Prea multe = unhealable.",i:"\u{1F480}"},"Consume":{t:"wipe",d:"100E: devoreaza TOATE addsurile ramase. Fiecare = buff permanent.",i:"\u{1F480}"},"Rift Sickness":{t:"damage",d:"Damage constant per faza. Stack HoTs. Mana management!",i:"\u{1F4A5}"},"Corrupted Devastation":{t:"damage",d:"Faza 2: boss zboara, dmg consistent + adds. Raid CDs!",i:"\u{1F525}"},"Ravenous Dive":{t:"mechanic",d:"Sfarsit Faza 2. Boss se prabuseste. Phys dmg + knockup.",i:"\u{1F409}"},"Rending Tear":{t:"mechanic",d:"Frontal con pe random. Dodge! Aplica bleed.",i:"\u26A0\uFE0F"},"Fearsome Cry":{t:"cast",d:"Cast interruptibil. KICK imediat.",i:"\u{1F52E}"},"Essence Bolt":{t:"cast",d:"Cast interruptibil. KICK imediat.",i:"\u{1F52E}"},"Light Feather":{t:"buff",d:"Reduce Holy dmg 50%. Vulnerabil la Shadow.",i:"\u2728"},"Void Feather":{t:"buff",d:"Reduce Shadow dmg 50%. Vulnerabil la Holy.",i:"\u{1F311}"},"Death Drop":{t:"mechanic",d:"Phoenix moare, zboara, se prabuseste. Dmg redus cu distanta.",i:"\u{1F4A5}"},"Egg Phase":{t:"mechanic",d:"30s burn pe ou = HP real. DPS cooldowns maxime AICI.",i:"\u{1F95A}"},"Voidlight Convergence":{t:"mechanic",d:"Infuzeaza Light/Void Feather.",i:"\u26A1"},"Light Dive":{t:"mechanic",d:"Holy damage split. Soak cu grupul.",i:"\u2600\uFE0F"},"Void Dive":{t:"mechanic",d:"Shadow damage split. Soak cu grupul.",i:"\u{1F311}"},"Death's Dirge":{t:"mechanic",d:"Marcheaza cu Dark Runes + laser sweep. Resonance (6yd) sau Dissonance (raid DoT).",i:"\u{1F3B5}"},"Dark Rune":{t:"debuff",d:"Cosmic dmg/sec. Resonance (6yd) sau Dissonance (raid DoT 5s).",i:"\u{1F3B6}"},"Resonance":{t:"damage",d:"Runa in ordine corecta = 6yd Cosmic dmg. Spread!",i:"\u{1F4A5}"},"Dissonance":{t:"damage",d:"Runa in ordine gresita = raid DoT 5s.",i:"\u{1F4A5}"},"Termination Prism":{t:"mechanic",d:"Matrici rotative +33% dmg boss/20s.",i:"\u{1F53A}"},"Safeguard Prism":{t:"mechanic",d:"Matrici defensive -33% dmg pe boss/stack. Interrupt!",i:"\u{1F537}"},"Midnight Crystal":{t:"mechanic",d:"Distruge inainte de Cosmic Fracture! Prioritate DPS.",i:"\u{1F48E}"},"Cosmic Fracture":{t:"wipe",d:"Crystal nedistrusa = dmg masiv + DoT 10s.",i:"\u{1F480}"},"Dusk Crystal":{t:"mechanic",d:"Pierde HP. Heal la full = Dawn Crystal. Moarte = Fracture.",i:"\u{1F319}"},"Dawn Crystal":{t:"buff",d:"Dusk healed la full. NU distruge accidental!",i:"\u2600\uFE0F"},"Heaven's Glaives":{t:"mechanic",d:"Glaive rotitoare ricoseaza. Contact direct = letal.",i:"\u2694\uFE0F"}};
const TC={wipe:{bg:"#2d0a0a",bd:"#ff4444",tx:"#ff6666",lb:"WIPE"},tank:{bg:"#0a1a2d",bd:"#4488cc",tx:"#6699dd",lb:"TANK"},debuff:{bg:"#2d1a0a",bd:"#cc8844",tx:"#ddaa66",lb:"DEBUFF"},damage:{bg:"#1a0a2d",bd:"#8844cc",tx:"#aa66dd",lb:"DAMAGE"},mechanic:{bg:"#0a2d1a",bd:"#44cc88",tx:"#66ddaa",lb:"MECHANIC"},cast:{bg:"#1a1a2d",bd:"#6666cc",tx:"#8888dd",lb:"CAST"},add:{bg:"#2d2d0a",bd:"#cccc44",tx:"#dddd66",lb:"ADD"},buff:{bg:"#0a2d2d",bd:"#44cccc",tx:"#66dddd",lb:"BUFF"}};

function Sk({n}){const[sh,setSh]=useState(false);const[p,setP]=useState({x:0,y:0});const a=AB[n];if(!a)return <span style={{color:"#e2c87f",fontWeight:600}}>{n}</span>;const tc=TC[a.t]||TC.mechanic;const en=e=>{const r=e.currentTarget.getBoundingClientRect();setP({x:r.left+r.width/2,y:r.top});setSh(true)};return(<span style={{position:"relative",display:"inline"}}><span onMouseEnter={en} onMouseLeave={()=>setSh(false)} onTouchStart={en} onTouchEnd={()=>setTimeout(()=>setSh(false),2500)} style={{color:tc.tx,fontWeight:700,cursor:"help",borderBottom:"1px dashed "+tc.bd,paddingBottom:1}}>{a.i} {n}</span>{sh&&<div style={{position:"fixed",left:Math.min(Math.max(p.x-160,8),window.innerWidth-340),top:Math.max(p.y-8,8),transform:"translateY(-100%)",width:320,background:tc.bg,border:"1px solid "+tc.bd,borderRadius:8,padding:"10px 14px",zIndex:9999,boxShadow:"0 4px 24px rgba(0,0,0,0.6)",pointerEvents:"none"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:18}}>{a.i}</span><span style={{color:tc.tx,fontWeight:700,fontSize:14}}>{n}</span><span style={{marginLeft:"auto",fontSize:10,fontWeight:700,background:tc.bd+"30",color:tc.tx,padding:"2px 6px",borderRadius:4}}>{tc.lb}</span></div><div style={{color:"#ccc",fontSize:12.5,lineHeight:1.5}}>{a.d}</div></div>}</span>)}

function Tx({text}){const parts=text.split(/\{([^}]+)\}/g);return <span>{parts.map((p,i)=>i%2===1?<Sk key={i} n={p}/>:p)}</span>}

const BOSSES=[{raid:"THE VOIDSPIRE",rs:"6 bosi \u2022 Voidstorm \u2022 17 martie 2026",num:1,name:"Imperator Averzian",sub:"Arena Control & Tic-Tac-Toe Grid",vid:"GeNGPGKIkhM",ovt:"Camera e un grid 3\u00d73. Fiecare ciclu, bossul trimite 3 Voidshapers prin {Shadow's Advance}. Casteaza {Gathering Darkness} pentru a revendica patrate. Opri 2 din 3 cu {Umbral Collapse}. {Dark Tears} = adduri. {Dark Upheaval} = damage constant.",wt:"{March of the Endless} \u2014 3 patrate aliniate = wipe.",tank:["Pozitionare boss departe de {Dark Tears} si zone Void-claimed.","{Blackening Wounds} \u2014 debuff stacking, reduce HP maxim. Swap ~10 stacks.","Ajusteaza pozitia bossului ca raidul sa soak {Umbral Collapse} corect."],healer:["{Dark Upheaval} \u2014 damage constant. Pe Normal gestionabil reactiv.","{Umbral Collapse} \u2014 damage split. Putini in soak = fiecare ia mai mult.","{Blackening Wounds} pe tank \u2014 reduce HP maxim progresiv."],dps:["Voidshapers = PRIORITATE #1. Interrupt {Gathering Darkness} imediat.","{Umbral Collapse} soak \u2014 3 DPS asignati per rotatie.","{Dark Tears} adds \u2014 2 DPS dedicati, restul pe boss."]},{num:2,name:"Vorasius",sub:"Crystal Walls & Void Breath",vid:"BUQYeX-h54o",ovt:"Boss stationar. Ziduri prin {Crystalline Eruption}. {Void Breath} = beam masiv. {Blistercreep} langa ziduri \u2014 explozia sparge cristal (Normal: 1/zid). {Primordial Roar} = damage progresiv.",wt:"{Void Breath} cu zid intact = wipe.",tank:["{Smashing Frenzy} \u2014 frontal OBLIGATORIU. Miss = explozie letala.","{Shadowclaw Slam} \u2014 primele 2 = {Smashed} (+150% phys/stack). T1 ia 2, T2 preia.","{Crystalline Eruption} \u2014 swap pe debuff.","{Aftershock} \u2014 cercuri dupa slam. Melee: impact=safe. Ranged: outrange."],healer:["{Primordial Roar} \u2014 damage progresiv. Stack in fata bossului la pull.","Tankul cu 2x {Smashed} = +300% phys 2 min. Pre-asigneaza externals.","Spike-uri la wall patterns + miscare."],dps:["{Blistercreep} \u2014 kiteaza langa ziduri. Normal: 1 explozie/zid.","Vorasius = stationar, pump. Wall breaks eficiente = fight scurt.","Al 3-lea {Void Breath} e periculos. Burst cooldowns early."]},{num:3,name:"Fallen-King Salhadaar",sub:"Void Orb Control & Burn",vid:"T-iuzixbyWk",ovt:"{Concentrated Void} orbs spre boss \u2014 distruge-le! {Cosmic Unraveling} = damage constant. {Despotic Command} = puddles. 100E = burn window.",wt:"{Void Infusion} \u2014 orb la boss = wipe.",tank:["Swap ~9-10 stacks. Boss path curat pentru beams la 100E.","{Shattering Twilight} \u2014 tankul iese din raid.","Boss centrat, spatiu pe laterale."],healer:["{Cosmic Unraveling} \u2014 presiune constanta. Throughput > burst.","Pe Normal, orb kills fara debuff \u2014 distruge rapid.","{Despotic Command} \u2014 puddles langa pereti. Dispel fara penalizari."],dps:["{Concentrated Void} orbe = PRIORITATE #1. Switch imediat.","100 Energy = BURN. DPS cooldowns AICI.","{Fractured Projections} \u2014 interrupt/stun. Puddles langa perete."]},{num:4,name:"Vaelgor & Ezzorak",sub:"Twin Dragons \u2014 Balance",vid:"335GwvXskeE",ovt:"Doi dragoni. Tank 15+ yarzi. HP in 15%. {Gloom} = Gloomfield. {Nullbeam} + {Voidorbs}. {Dread Breath}. 100E: {Midnight Flames} (10s) \u2014 {Radiant Barrier}.",wt:"{Twilight Bond} \u2014 HP >15% = +100% dmg. Afara din {Radiant Barrier} = moarte.",tank:["Distanta 15+ yarzi. Sub 15 = {Twilight Bond}.","{Vaelwing} (Vaelgor) \u2014 melee buff. Active mitigation.","{Rakfang} (Ezzorak) \u2014 hit + heal absorb. Swap dupa 3 stacks.","{Tail Lash} \u2014 NU in spatele dragonilor. 35yd knockback.","{Impale} \u2014 dupa Rakfang, con frontal bleed + stun 3s.","La {Midnight Flames} = {Radiant Barrier}."],healer:["{Gloomtouched} \u2014 Shadow DoT 12s. Fara Diminish pe Normal.","{Rakfang} heal absorb creste per stack. Heal through.","{Midnight Flames} \u2014 10s in barrier. 25% trece. Raid CDs.","{Dread Breath} \u2014 spike pe random target."],dps:["HP Parity Caller OBLIGATORIU. 15% HP. Padding = wipe.","{Gloom} soak \u2014 micsoreaza Gloomfield (max 7). Fara Diminish.","{Voidorbs} dupa {Nullbeam} \u2014 grupeaza, stun + AoE.","{Dread Breath} \u2014 misca-te din grup.","{Radiant Barrier} la {Midnight Flames} \u2014 TOTI."]},{num:5,name:"Lightblinded Vanguard",sub:"Council Fight \u2014 3 Bosi",vid:"pU_pFc-7QTs",ovt:"3 bosi: Lightblood, Bellamy, Senn. {Empowerment} unic. {Light Infused} = tick constant. {Avenger's Shield} = spread. {Tyr's Wrath} = heal absorb.",wt:"Bosii prea aproape = aure overlap = amplificare extrema.",tank:["Bosii despartiti, aure sa nu se suprapuna.","Bellamy: Judgment combos pe tank. Cooldowns.","{Sacred Shield} activ = interrupts blocate. Dmg pe shield.","{Consecration Zones} \u2014 zone permanente. Planifica pozitia."],healer:["{Light Infused} \u2014 tick constant. Throughput consistent.","{Tyr's Wrath} \u2014 heal absorb pe 3 apropiati. Roteaza.","{Avenger's Shield} \u2014 cercuri, spread imediat.","{Empowerment} \u2014 Lightblood=dmg, Bellamy=reduce, Senn=silence."],dps:["Shadowguard Stalwarts = kill rapid. Target swap.","Interrupt Voidshaper casts. Asigneaza kicks.","Spread pe {Avenger's Shield}.","Pe Normal: Heroism/Lust liber."]},{num:6,name:"Crown of the Cosmos",sub:"Alleria \u2014 Final Boss",vid:"o4T5jAILWYc",ovt:"FAZA 1: {Undying Sentinels} (3, tank dedicat). {Silverstrike Arrow} curata debuffuri. {Null Corona} = heal absorb. INTERMISSION. FAZA 2: {Gravity Collapse} + Void Zones.",wt:"{Echoing Darkness} \u2014 Sentinel fara tank / tank pierde range Alleria = wipe.",tank:["Faza 1: 3 {Undying Sentinels}, tank dedicat melee PERMANENT.","Melee range pe Alleria. Pierdere = {Echoing Darkness}.","Faza 2: {Gravity Collapse} + anomalies. Defensives + externals.","Void Zones persista. Spatiul se reduce."],healer:["{Null Corona} \u2014 heal absorb. Heal-through inainte de dispel.","{Silverstrike Arrow} \u2014 curata DAR heal reduction. Evita cleave.","{Aspect of the End} \u2014 reduce healing pana se misca.","Intermission \u2014 AoE brutal. Raid CDs.","Faza 2: damage creste masiv."],dps:["Faza 1: curata {Undying Sentinels}. Nu tunnel Alleria.","Intermission: mobility DPS maxim.","Faza 2: fiecare DPS conteaza.","{Grasp of Emptiness} \u2014 beams, miscare curata."]},{raid:"THE DREAMRIFT",rs:"1 boss \u2022 Harandar \u2022 17 martie 2026",num:7,name:"Chimaerus",sub:"Add Control & Dual Realm",ovt:"2 grupuri. Soak {Alndust Upheaval} = {Alnsight} = targetezi {Manifestations}. {Rift Sickness} = damage. 100E: {Consume}. Faza 2: {Corrupted Devastation} + {Ravenous Dive}.",wt:"{Cannibalized Essence} permanent per add. {Consume} la 100E devoreaza TOTUL.",tank:["Boss pozitionat ca {Manifestations} sa fie interceptate.","Soak circle \u2014 Nature split. Grupul in cerc.","Rift Tank: big add + small adds AoE.","Defensives pentru {Consume}/{Ravenous Dive}."],healer:["{Rift Sickness} \u2014 damage constant. Stack HoTs.","Mana management crucial. OOM = esec.","{Corrupted Devastation} (Faza 2) \u2014 raid CDs AICI.","{Ravenous Dive} \u2014 Phys dmg + knockup."],dps:["{Manifestations} = PRIORITATE #1. Add control > boss.","Shields in secventa corecta.","{Fearsome Cry} + {Essence Bolt} = KICK obligatoriu.","{Alnsight} de la {Alndust Upheaval} = targetezi adds.","{Rending Tear} \u2014 frontal con, dodge.","Colossus add = prioritate maxima."]},{raid:"MARCH ON QUEL\u2019DANAS",rs:"2 bosi \u2022 Isle of Quel'Danas \u2022 31 martie 2026",num:8,name:"Belo\u2019ren",sub:"Light vs Void Phoenix",ovt:"{Voidlight Convergence}: {Light Feather} sau {Void Feather}. Conuri Light/Void. 0 HP: {Death Drop} + {Egg Phase} (30s). Cicleaza 2-3x. {Light Dive}/{Void Dive} = split.",wt:"Tank cone miss = +30% dmg boss stacking. 2+ = wipe.",tank:["Color Cone \u2014 tankul cu culoarea POTRIVITA ia conul.","Tankuri MEREU culori opuse.","{Death Drop} \u2014 dmg redus cu distanta.","{Egg Phase} (30s) \u2014 BURN maxim."],healer:["Wrong color = damage mare. Monitorizat.","Heal absorb raid-wide + damage constant.","Beam pe random, wrong color = spike masiv.","{Light Dive}/{Void Dive} \u2014 split, soak corect.","{Egg Phase} \u2014 damage creste per ciclu."],dps:["Cooldowns pe {Egg Phase}, NU phoenix form.","Hero/Lust tarziu cand execute e mare.","Color safety \u2014 NU fi lovit de culoarea opusa.","Interrupts. Gateway dupa {Death Drop}."]},{num:9,name:"Midnight Falls (L\u2019ura)",sub:"Dark Naaru \u2014 Season Finale",ovt:"{Death's Dirge}: {Dark Rune} + laser = {Resonance}/{Dissonance}. {Safeguard Prism} reduce dmg boss. {Termination Prism} creste dmg. {Midnight Crystal} + {Cosmic Fracture}. {Dusk Crystal} heal = {Dawn Crystal}.",wt:"{Cosmic Fracture} \u2014 {Midnight Crystal} nedistrusa = wipe. Enrage tight.",tank:["{Termination Prism} \u2014 +33% dmg boss/20s. Pozitioneaza.","{Safeguard Prism} \u2014 -33%/stack. Interrupt = -1.","Spatiul se micsoreaza.","{Heaven's Glaives} \u2014 evita contact."],healer:["{Death's Dirge} + {Dark Rune} = Cosmic dmg/sec. Note constante pe Normal.","{Dusk Crystal} heal la full = {Dawn Crystal}. Moarte = {Cosmic Fracture}.","Throughput consistent > burst.","{Heaven's Glaives} contact = spike masiv."],dps:["{Midnight Crystal} = PRIORITATE ABSOLUTA.","{Dark Rune}: {Resonance} 6yd, {Dissonance} raid DoT.","{Safeguard Prism} interrupts \u2014 -1 stack/kick.","{Dawn Crystal} \u2014 NU distruge accidental!","Enrage tight. Optimizeaza rotatie.","{Heaven's Glaives} \u2014 evita."]}];

const RS={tank:{bg:"#0d2137",bd:"#1a5276",lb:"\u{1F6E1}\uFE0F TANK",hd:"#1a5276"},healer:{bg:"#0d2517",bd:"#1e7d3a",lb:"\u2795 HEALER",hd:"#1e7d3a"},dps:{bg:"#2a0d0d",bd:"#922b21",lb:"\u2694\uFE0F DPS",hd:"#922b21"}};
function RoleSec({role,items}){const s=RS[role];return <div style={{marginBottom:16,borderRadius:8,overflow:"hidden",border:"1px solid "+s.bd+"40"}}><div style={{background:s.hd,padding:"8px 16px"}}><span style={{color:"#fff",fontWeight:700,fontSize:15}}>{s.lb}</span></div>{items.map((item,i)=><div key={i} style={{background:i%2===0?s.bg:s.bg+"cc",padding:"10px 16px",borderTop:"1px solid "+s.bd+"20",fontSize:13.5,lineHeight:1.65,color:"#d0d0d0"}}><Tx text={item}/></div>)}</div>}

function BossCard({boss}){const[open,setOpen]=useState(false);const vu=boss.vid?"https://www.youtube.com/watch?v="+boss.vid:null;return <div style={{marginBottom:20,borderRadius:12,border:"1px solid #3a1a5540",background:"#120a1e",overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.3)"}}><div onClick={()=>setOpen(!open)} style={{padding:"16px 20px",cursor:"pointer",background:open?"linear-gradient(135deg,#1a0d2e,#2a1540)":"#160e22",display:"flex",alignItems:"center",gap:12,borderBottom:open?"1px solid #4a1a6b40":"none"}}><span style={{background:"#c9a832",color:"#1a0a2d",fontWeight:800,width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{boss.num}</span><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{color:"#e8d5f5",fontWeight:700,fontSize:17}}>{boss.name}</span>{vu&&<span style={{fontSize:10,background:"#ff000025",color:"#ff4444",border:"1px solid #ff000040",borderRadius:4,padding:"1px 6px",fontWeight:600}}>{"\u25B6"} VIDEO</span>}</div><div style={{color:"#8a7a9a",fontSize:12,marginTop:2}}>{boss.sub}</div></div><span style={{color:"#8a7a9a",fontSize:20,transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}>{"\u25BE"}</span></div>{open&&<div style={{padding:"16px 20px"}}>{vu&&<a href={vu} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"block",marginBottom:16,borderRadius:8,overflow:"hidden",position:"relative",height:170,textDecoration:"none",border:"1px solid #ff000030",backgroundImage:"url(https://img.youtube.com/vi/"+boss.vid+"/hqdefault.jpg)",backgroundSize:"cover",backgroundPosition:"center"}}><div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)"}}></div><div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><div style={{width:52,height:52,borderRadius:"50%",background:"#ff0000",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(255,0,0,0.4)"}}><span style={{color:"#fff",fontSize:22,marginLeft:3}}>{"\u25B6"}</span></div><span style={{color:"#fff",fontSize:12,fontWeight:600,textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>Deschide Video pe YouTube {"\u2197"}</span></div></a>}<div style={{fontSize:13.5,lineHeight:1.7,color:"#c0b8cc",marginBottom:16,padding:"12px 16px",background:"#1a1028",borderRadius:8,border:"1px solid #2a1a3a"}}><Tx text={boss.ovt}/></div><div style={{marginBottom:16,padding:"10px 16px",borderRadius:8,background:"#2d0a0a",border:"1px solid #ff444440",fontSize:13.5,lineHeight:1.6,color:"#ff8888"}}><span style={{fontWeight:700}}>{"\u26A0"} WIPE: </span><Tx text={boss.wt}/></div><RoleSec role="tank" items={boss.tank}/><RoleSec role="healer" items={boss.healer}/><RoleSec role="dps" items={boss.dps}/></div>}</div>}

function App(){let cr=null;return <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0612,#10081a)",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",padding:"24px 16px",maxWidth:780,margin:"0 auto"}}><div style={{textAlign:"center",marginBottom:32}}><div style={{color:"#c9a832",fontSize:12,letterSpacing:3,fontWeight:700,marginBottom:8}}>WORLD OF WARCRAFT: MIDNIGHT</div><h1 style={{color:"#e8d5f5",fontSize:26,fontWeight:800,margin:"0 0 8px",textShadow:"0 0 30px #4a1a6b80"}}>Season 1 Raid Guide {"\u2014"} Normal</h1><p style={{color:"#8a7a9a",fontSize:13,margin:0}}>9 Bosi {"\u2022"} Tank / Healer / DPS {"\u2022"} Hover pe abilitati pentru detalii</p><div style={{marginTop:16,display:"inline-flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>{Object.entries(TC).map(([k,v])=><span key={k} style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:v.bg,border:"1px solid "+v.bd+"60",color:v.tx,fontWeight:600}}>{v.lb}</span>)}</div></div>{BOSSES.map((b,i)=>{const sh=b.raid&&b.raid!==cr;if(b.raid)cr=b.raid;return <div key={i}>{sh&&<div style={{margin:"32px 0 16px",padding:"16px 20px",background:"linear-gradient(90deg,#4a1a6b30,transparent)",borderLeft:"4px solid #4a1a6b",borderRadius:"0 8px 8px 0"}}><div style={{color:"#c9a832",fontWeight:800,fontSize:18,letterSpacing:1}}>{b.raid}</div><div style={{color:"#8a7a9a",fontSize:12,marginTop:4}}>{b.rs}</div></div>}<BossCard boss={b}/></div>})}<div style={{textAlign:"center",padding:"24px 0",color:"#4a3a5a",fontSize:11}}>Hover/tap pe abilitati colorate pentru tooltip</div></div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
